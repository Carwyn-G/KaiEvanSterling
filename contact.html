<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Kai Evan Sterling</title>
    <link rel="stylesheet" href="main.css">
    <link rel="stylesheet" href="https://use.typekit.net/iyj8vmn.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="logo"><img src="images/KES-logo.svg" alt="Kai Evan Sterling" class="svg-logo"/></a>
            <div class="topnav default" id="navbar">
                <button class="hamburger" onclick="hamburger()"><img id="menu-icon" src="images/hamburger.png" alt="click to open the menu"></button>
                <ul>
                    <li><a href="about.html">About</a></li>
                    <li><a href="contact.html">Contact</a></li>
                    <li><button onclick="expandExplore()">Explore <img src="images/arrow down.png" id="arrow"></button>
                        <div id="submenu" class="submenu expandable">
                            <ul>
                                <li class="explore"><a href="world.html">World</a></li>
                                <li class="explore"><a href="characters.html">Characters</a></li>
                            </ul>
                        </div>
                    </li>
                </ul>
            </div>
        </nav>
    </header>
    <main id="contact-page">
        <form id="contact-form">
            <label for="name">Name:</label>
            <input type="text" name="name" required />
            <label for="email">Email:</label>
            <input type="email" name="email" required />
            <label for="message">Message:</label>
            <textarea name="message" required></textarea>
            <button type="submit" id="contact-btn">Send</button>
        </form>
    </main>
    <footer>
        <div>
            <p>Stay up to date on all the latest news from Kai Evan Sterling</p>
            <div>
                <h3>Join the Mailing List</h3>
                <form id="maillist-form">
                    <label for="email">Email:</label>
                    <input type="email" name="email" required/>
                    <button type="submit" id="maillist-btn">Submit</button>
                </form>
            </div>
        </div>
    </footer>
</body>
</html>
