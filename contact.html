<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Kai Evan Sterling</title>
    <link rel="stylesheet" href="main.css">
    <link rel="stylesheet" href="https://use.typekit.net/iyj8vmn.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="logo"><img src="images/KES-logo.svg" alt="Kai Evan Sterling" class="svg-logo"/></a>
            <div class="topnav default" id="navbar">
                <button class="hamburger" onclick="hamburger()"><img id="menu-icon" src="images/hamburger.png" alt="click to open the menu"></button>
                <ul>
                    <li><a href="about.html">About</a></li>
                    <li><a href="contact.html">Contact</a></li>
                    <li><button onclick="expandExplore()">Explore <img src="images/arrow down.png" id="arrow"></button>
                        <div id="submenu" class="submenu expandable">
                            <ul>
                                <li class="explore"><a href="world.html">World</a></li>
                                <li class="explore"><a href="characters.html">Characters</a></li>
                            </ul>
                        </div>
                    </li>
                </ul>
            </div>
        </nav>
    </header>
    <main id="contact-page">
        <div class = "contact-blurb">
            <h1>Get in Touch</h1>
            <p>If you have any questions or comments, you can send them to the author by filling out the form.</p>
        </div>
        <form id="contact-form">
            <label for="name">Name:</label>
            <input type="text" name="name" id="name" placeholder="Enter your name" required>
            <label for="email">Email:</label>
            <input type="text" name="email" id="email" placeholder="Enter your email" required>
            <label for="subject">Subject:</label>
            <input type="text" name="subject" id="subject" placeholder="Enter a subject for your message" required>
            <label for="message">Message:</label>
            <textarea name="message" id="message"  placeholder="Enter your message" required></textarea>
            <button type="submit" id="contact-btn">Send</button>
        </form>
    </main>
    <footer>
        <div class="maillist">
            <p>Stay up to date on all the latest news from Kai Evan Sterling</p>
            <div class="join-form">
                <h3>Join the Mailing List</h3>
                <form id="maillist-form">
                    <label for="email">Email:</label>
                    <input placeholder="enter your email here" type="email" name="email" required/>
                    <button type="submit" id="maillist-btn">Submit</button>
                </form>
            </div>
            <p class="small">&copy; 2026, Kai Evan Sterling. All Rights Reserved.</p>            
        </div>
        <div class="socials">
            <a target="_blank" href="https://bsky.app/profile/kaievansterling.bsky.social"><img src = "images/Bluesky-icon.svg" class="icon"></a>
            <a target="_blank" href="https://www.instagram.com/kaievansterling/"><img src="images/instagram-icon.svg" class="icon"></a>
        </div>
    </footer>
</body>
</html>
